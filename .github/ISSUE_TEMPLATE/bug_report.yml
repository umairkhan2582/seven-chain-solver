name: Bug Report
  about: Report a bug in the Seven Chain Bridge Solver
  title: "[BUG] "
  labels: ["bug"]
  assignees: []
  body:
    - type: markdown
      attributes:
        value: |
          Thanks for reporting a bug! Please fill this out completely.
    - type: textarea
      id: description
      attributes:
        label: Bug Description
        description: A clear description of what the bug is.
      validations:
        required: true
    - type: textarea
      id: reproduce
      attributes:
        label: Steps to Reproduce
        description: Steps to reproduce the bug
        placeholder: |
          1. Configure .env with ...
          2. Run npm run dev
          3. See error ...
      validations:
        required: true
    - type: textarea
      id: expected
      attributes:
        label: Expected Behavior
        description: What did you expect to happen?
      validations:
        required: true
    - type: dropdown
      id: os
      attributes:
        label: Operating System
        options:
          - Ubuntu 22.04
          - Ubuntu 20.04
          - Debian
          - Other Linux
          - macOS
          - Windows
      validations:
        required: true
    - type: input
      id: nodeversion
      attributes:
        label: Node.js Version
        placeholder: "e.g. 20.0.0"
      validations:
        required: true
    - type: textarea
      id: logs
      attributes:
        label: Relevant Logs
        description: Paste solver logs here
        render: shell
  