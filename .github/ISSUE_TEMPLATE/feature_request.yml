name: Feature Request
  about: Suggest a new feature or improvement
  title: "[FEATURE] "
  labels: ["enhancement"]
  assignees: []
  body:
    - type: markdown
      attributes:
        value: |
          Thanks for suggesting a feature!
    - type: textarea
      id: summary
      attributes:
        label: Feature Summary
        description: Brief one-line description of the feature.
      validations:
        required: true
    - type: textarea
      id: problem
      attributes:
        label: Problem It Solves
        description: What problem does this address?
      validations:
        required: true
    - type: textarea
      id: solution
      attributes:
        label: Proposed Solution
        description: How should it work?
      validations:
        required: true
    - type: dropdown
      id: category
      attributes:
        label: Category
        options:
          - Performance
          - New Chain Support
          - Solver Economics
          - Security
          - Developer Experience
          - Documentation
          - Other
      validations:
        required: true
  